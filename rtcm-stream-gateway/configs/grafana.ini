[server]
http_port = 3000
domain = grafana
root_url = http://localhost:3000

[security]
admin_user = admin
admin_password = admin123
disable_gravatar = true

[datasources]
[[datasources]]
name = Prometheus
type = prometheus
access = proxy
url = http://prometheus:9090
is_default = true
uid = prometheus

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/overview.json
